<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bens Trans - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 400px; margin: 100px auto;">
            <h2 style="text-align: center; color: #667eea; margin-bottom: 30px;">Bens Trans Login</h2>
            
            <div class="alert alert-info" style="margin-bottom: 20px; padding: 15px; background: #e3f2fd; border-radius: 5px; border-left: 4px solid #2196F3;">
                <strong>ℹ️ Client Login:</strong>
                <ul style="margin: 10px 0 0 20px; font-size: 0.9rem;">
                    <li>Email: Your booking email</li>
                    <li>Password: Your 8-digit ID number</li>
                </ul>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
            
            <div id="message"></div>
            
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
