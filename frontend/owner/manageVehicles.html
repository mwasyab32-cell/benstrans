<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Vehicles - Bens Trans</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .vehicle-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .vehicle-card h3 {
            margin-top: 0;
            color: #667eea;
        }
        
        .vehicle-info {
            margin: 15px 0;
        }
        
        .vehicle-info p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-approved { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        
        .vehicle-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-message { background: #28a745; color: white; }
        
        .btn:hover { opacity: 0.9; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Vehicles</h1>
            <div>
                <a href="registerVehicle.html" class="btn btn-primary">+ Register New Vehicle</a>
                <a href="manageTrips.html" class="btn btn-warning" style="background:#fd7e14;">🗓 Manage Trips</a>
                <a href="../index.html" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>

        <div id="vehiclesList" class="vehicles-grid">
            <p>Loading vehicles...</p>
        </div>
    </div>

    <!-- Floating Chat Button -->
    <button onclick="toggleChat()" id="chatFloatBtn"
        style="position:fixed; bottom:24px; right:24px; z-index:1999;
               background:linear-gradient(135deg,#667eea,#764ba2); color:white;
               border:none; border-radius:50px; padding:14px 22px; font-size:15px;
               cursor:pointer; box-shadow:0 4px 15px rgba(102,126,234,0.5);
               display:flex; align-items:center; gap:8px;">
        💬 Message Admin
        <span id="unreadBadge" style="display:none; background:#dc3545; color:white;
              border-radius:50%; padding:1px 7px; font-size:11px;"></span>
    </button>

    <!-- Chat Panel -->
    <div id="chatPanel" style="display:none; position:fixed; bottom:80px; right:24px; width:360px;
         background:white; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.25);
         z-index:2000; flex-direction:column; overflow:hidden;">
        <div style="background:linear-gradient(135deg,#667eea,#764ba2); color:white;
                    padding:15px 20px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <div style="font-weight:bold; font-size:15px;">💬 Message Admin</div>
                <div id="chatAdminName" style="font-size:12px; opacity:0.85;"></div>
            </div>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; line-height:1;">✕</button>
        </div>
        <div id="chatMessages" style="overflow-y:auto; padding:15px; height:300px; background:#f8f9fa;"></div>
        <div style="padding:12px; border-top:1px solid #eee; background:white;">
            <input type="text" id="chatSubject" placeholder="Subject (optional)"
                style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:6px;
                       margin-bottom:8px; box-sizing:border-box; font-size:13px;">
            <div style="display:flex; gap:8px;">
                <textarea id="chatInput" placeholder="Type your message... (Enter to send)" rows="2"
                    style="flex:1; padding:8px 10px; border:1px solid #ddd; border-radius:6px;
                           resize:none; font-size:13px; box-sizing:border-box;"></textarea>
                <button onclick="sendChatMessage()"
                    style="background:linear-gradient(135deg,#667eea,#764ba2); color:white;
                           border:none; border-radius:6px; padding:0 16px; cursor:pointer; font-size:20px;">➤</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Vehicle</h2>
            <form id="editForm">
                <input type="hidden" id="editVehicleId">
                
                <div class="form-group">
                    <label for="editVehicleNumber">Vehicle Number/Plate:</label>
                    <input type="text" id="editVehicleNumber" required>
                </div>
                
                <div class="form-group">
                    <label for="editRouteFrom">Route From:</label>
                    <input type="text" id="editRouteFrom" required placeholder="e.g., Nairobi">
                </div>
                
                <div class="form-group">
                    <label for="editRouteTo">Route To:</label>
                    <input type="text" id="editRouteTo" required placeholder="e.g., Mombasa">
                </div>
                
                <div class="form-group">
                    <label for="editTotalSeats">Total Seats:</label>
                    <input type="number" id="editTotalSeats" required min="1" max="100">
                </div>
                
                <div class="form-group">
                    <label for="editPrice">Price per Seat (KSh):</label>
                    <input type="number" id="editPrice" required min="1">
                </div>
                
                <div class="form-group">
                    <label for="editVehicleType">Vehicle Type:</label>
                    <select id="editVehicleType" required>
                        <option value="bus">Bus (KSh 5,000 registration)</option>
                        <option value="shuttle">Shuttle (KSh 3,000 registration)</option>
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'https://benstrans.onrender.com/api';

        async function loadVehicles() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '../login.html';
                    return;
                }

                const response = await fetch(`${API_BASE}/vehicles/my-vehicles`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load vehicles');

                const vehicles = await response.json();
                displayVehicles(vehicles);
            } catch (error) {
                document.getElementById('vehiclesList').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        function displayVehicles(vehicles) {
            const container = document.getElementById('vehiclesList');
            
            if (vehicles.length === 0) {
                container.innerHTML = '<p>No vehicles registered yet. Click "Register New Vehicle" to add one.</p>';
                return;
            }

            container.innerHTML = vehicles.map(v => `
                <div class="vehicle-card">
                    <h3>${v.vehicle_number}</h3>
                    <div class="vehicle-info">
                        <p><strong>Route:</strong> <span>${v.route_from} → ${v.route_to}</span></p>
                        <p><strong>Type:</strong> <span>${v.vehicle_type}</span></p>
                        <p><strong>Seats:</strong> <span>${v.total_seats}</span></p>
                        <p><strong>Price:</strong> <span>KSh ${v.price}</span></p>
                        <p><strong>Status:</strong> <span class="status-badge status-${v.status}">${v.status.toUpperCase()}</span></p>
                        <p><strong>Registered:</strong> <span>${new Date(v.created_at).toLocaleDateString()}</span></p>
                    </div>
                    <div class="vehicle-actions">
                        <button class="btn btn-primary" onclick="editVehicle(${v.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteVehicle(${v.id}, '${v.vehicle_number}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function editVehicle(id) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load vehicle details');

                const vehicle = await response.json();
                
                // Fill form
                document.getElementById('editVehicleId').value = vehicle.id;
                document.getElementById('editVehicleNumber').value = vehicle.vehicle_number;
                document.getElementById('editRouteFrom').value = vehicle.route_from;
                document.getElementById('editRouteTo').value = vehicle.route_to;
                document.getElementById('editTotalSeats').value = vehicle.total_seats;
                document.getElementById('editPrice').value = vehicle.price;
                document.getElementById('editVehicleType').value = vehicle.vehicle_type;
                
                // Show modal
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editVehicleId').value;
            const data = {
                vehicle_number: document.getElementById('editVehicleNumber').value,
                route_from: document.getElementById('editRouteFrom').value,
                route_to: document.getElementById('editRouteTo').value,
                total_seats: parseInt(document.getElementById('editTotalSeats').value),
                price: parseFloat(document.getElementById('editPrice').value),
                vehicle_type: document.getElementById('editVehicleType').value
            };

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                alert('✅ Vehicle updated successfully!');
                closeEditModal();
                loadVehicles();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        async function deleteVehicle(id, vehicleNumber) {
            if (!confirm(`Are you sure you want to delete vehicle "${vehicleNumber}"?\n\nThis action cannot be undone.`)) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                alert('✅ Vehicle deleted successfully!');
                loadVehicles();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Load vehicles on page load
        loadVehicles();
    </script>

    <script>
        // ===== CHAT WITH ADMIN =====
        const CHAT_API = 'https://benstrans.onrender.com/api';
        let adminId = null;
        let chatOpen = false;
        let pollInterval = null;

        function getToken() {
            return localStorage.getItem('token');
        }

        function authHeaders() {
            return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
        }

        async function initChat() {
            try {
                const res = await fetch(`${CHAT_API}/messages/admins`, { headers: authHeaders() });
                const admins = await res.json();
                if (admins.length === 0) return;
                adminId = admins[0].id;
                document.getElementById('chatAdminName').textContent = admins[0].name;
                checkUnread();
            } catch (e) { console.error('Chat init error', e); }
        }

        async function checkUnread() {
            try {
                const res = await fetch(`${CHAT_API}/messages/unread-count`, { headers: authHeaders() });
                const data = await res.json();
                const badge = document.getElementById('unreadBadge');
                if (data.unread_count > 0) {
                    badge.textContent = data.unread_count;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) {}
        }

        async function toggleChat() {
            const panel = document.getElementById('chatPanel');
            chatOpen = !chatOpen;
            panel.style.display = chatOpen ? 'flex' : 'none';
            if (chatOpen) {
                await loadChatMessages();
                if (!pollInterval) {
                    pollInterval = setInterval(loadChatMessages, 5000);
                }
            } else {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        async function loadChatMessages() {
            if (!adminId) return;
            try {
                const res = await fetch(`${CHAT_API}/messages/conversation/${adminId}`, { headers: authHeaders() });
                const messages = await res.json();
                const container = document.getElementById('chatMessages');
                const currentUser = JSON.parse(localStorage.getItem('user') || '{}');

                if (!Array.isArray(messages) || messages.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#999; font-size:13px; margin-top:40px;">No messages yet. Say hello!</p>';
                    return;
                }

                container.innerHTML = messages.map(m => {
                    const isMe = m.sender_id === currentUser.id;
                    const time = new Date(m.created_at).toLocaleTimeString('en-KE', { hour: '2-digit', minute: '2-digit' });
                    const date = new Date(m.created_at).toLocaleDateString('en-KE', { day: '2-digit', month: 'short' });
                    return `
                        <div style="display:flex; justify-content:${isMe ? 'flex-end' : 'flex-start'}; margin-bottom:10px;">
                            <div style="max-width:75%; background:${isMe ? 'linear-gradient(135deg,#667eea,#764ba2)' : 'white'};
                                color:${isMe ? 'white' : '#333'}; padding:9px 13px; border-radius:${isMe ? '12px 12px 2px 12px' : '12px 12px 12px 2px'};
                                box-shadow:0 1px 4px rgba(0,0,0,0.1); font-size:13px;">
                                ${m.subject && m.subject !== 'No Subject' ? `<div style="font-size:11px; opacity:0.75; margin-bottom:3px;">${m.subject}</div>` : ''}
                                <div>${m.message}</div>
                                <div style="font-size:10px; opacity:0.65; margin-top:4px; text-align:right;">${date} ${time}</div>
                            </div>
                        </div>`;
                }).join('');

                container.scrollTop = container.scrollHeight;
                document.getElementById('unreadBadge').style.display = 'none';
            } catch (e) { console.error('Load messages error', e); }
        }

        async function sendChatMessage() {
            if (!adminId) { alert('No admin found to message.'); return; }
            const input = document.getElementById('chatInput');
            const subjectInput = document.getElementById('chatSubject');
            const message = input.value.trim();
            if (!message) return;

            try {
                const res = await fetch(`${CHAT_API}/messages/send`, {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({
                        receiver_id: adminId,
                        subject: subjectInput.value.trim() || 'No Subject',
                        message
                    })
                });
                if (res.ok) {
                    input.value = '';
                    subjectInput.value = '';
                    await loadChatMessages();
                } else {
                    const err = await res.json();
                    alert('Failed to send: ' + err.error);
                }
            } catch (e) { alert('Send failed. Please try again.'); }
        }

        // Send on Enter (Shift+Enter for newline)
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });

        // Init chat on load
        initChat();
        // Poll unread count every 30s
        setInterval(checkUnread, 30000);
    </script>
</body>
</html>
