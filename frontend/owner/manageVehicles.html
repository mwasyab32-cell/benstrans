<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Vehicles - Bens Trans</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .vehicle-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .vehicle-card h3 {
            margin-top: 0;
            color: #667eea;
        }
        
        .vehicle-info {
            margin: 15px 0;
        }
        
        .vehicle-info p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-approved { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        
        .vehicle-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        
        .btn:hover { opacity: 0.9; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>My Vehicles</h1>
            <div>
                <a href="registerVehicle.html" class="btn btn-primary">+ Register New Vehicle</a>
                <a href="../index.html" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>
        
        <div id="vehiclesList" class="vehicles-grid">
            <p>Loading vehicles...</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Vehicle</h2>
            <form id="editForm">
                <input type="hidden" id="editVehicleId">
                
                <div class="form-group">
                    <label for="editVehicleNumber">Vehicle Number/Plate:</label>
                    <input type="text" id="editVehicleNumber" required>
                </div>
                
                <div class="form-group">
                    <label for="editRouteFrom">Route From:</label>
                    <input type="text" id="editRouteFrom" required placeholder="e.g., Nairobi">
                </div>
                
                <div class="form-group">
                    <label for="editRouteTo">Route To:</label>
                    <input type="text" id="editRouteTo" required placeholder="e.g., Mombasa">
                </div>
                
                <div class="form-group">
                    <label for="editTotalSeats">Total Seats:</label>
                    <input type="number" id="editTotalSeats" required min="1" max="100">
                </div>
                
                <div class="form-group">
                    <label for="editPrice">Price per Seat (KSh):</label>
                    <input type="number" id="editPrice" required min="1">
                </div>
                
                <div class="form-group">
                    <label for="editVehicleType">Vehicle Type:</label>
                    <select id="editVehicleType" required>
                        <option value="bus">Bus (KSh 5,000 registration)</option>
                        <option value="shuttle">Shuttle (KSh 3,000 registration)</option>
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';

        async function loadVehicles() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '../login.html';
                    return;
                }

                const response = await fetch(`${API_BASE}/vehicles/my-vehicles`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load vehicles');

                const vehicles = await response.json();
                displayVehicles(vehicles);
            } catch (error) {
                document.getElementById('vehiclesList').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }

        function displayVehicles(vehicles) {
            const container = document.getElementById('vehiclesList');
            
            if (vehicles.length === 0) {
                container.innerHTML = '<p>No vehicles registered yet. Click "Register New Vehicle" to add one.</p>';
                return;
            }

            container.innerHTML = vehicles.map(v => `
                <div class="vehicle-card">
                    <h3>${v.vehicle_number}</h3>
                    <div class="vehicle-info">
                        <p><strong>Route:</strong> <span>${v.route_from} → ${v.route_to}</span></p>
                        <p><strong>Type:</strong> <span>${v.vehicle_type}</span></p>
                        <p><strong>Seats:</strong> <span>${v.total_seats}</span></p>
                        <p><strong>Price:</strong> <span>KSh ${v.price}</span></p>
                        <p><strong>Status:</strong> <span class="status-badge status-${v.status}">${v.status.toUpperCase()}</span></p>
                        <p><strong>Registered:</strong> <span>${new Date(v.created_at).toLocaleDateString()}</span></p>
                    </div>
                    <div class="vehicle-actions">
                        <button class="btn btn-primary" onclick="editVehicle(${v.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteVehicle(${v.id}, '${v.vehicle_number}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function editVehicle(id) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load vehicle details');

                const vehicle = await response.json();
                
                // Fill form
                document.getElementById('editVehicleId').value = vehicle.id;
                document.getElementById('editVehicleNumber').value = vehicle.vehicle_number;
                document.getElementById('editRouteFrom').value = vehicle.route_from;
                document.getElementById('editRouteTo').value = vehicle.route_to;
                document.getElementById('editTotalSeats').value = vehicle.total_seats;
                document.getElementById('editPrice').value = vehicle.price;
                document.getElementById('editVehicleType').value = vehicle.vehicle_type;
                
                // Show modal
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editVehicleId').value;
            const data = {
                vehicle_number: document.getElementById('editVehicleNumber').value,
                route_from: document.getElementById('editRouteFrom').value,
                route_to: document.getElementById('editRouteTo').value,
                total_seats: parseInt(document.getElementById('editTotalSeats').value),
                price: parseFloat(document.getElementById('editPrice').value),
                vehicle_type: document.getElementById('editVehicleType').value
            };

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                alert('✅ Vehicle updated successfully!');
                closeEditModal();
                loadVehicles();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        async function deleteVehicle(id, vehicleNumber) {
            if (!confirm(`Are you sure you want to delete vehicle "${vehicleNumber}"?\n\nThis action cannot be undone.`)) {
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/vehicles/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error);
                }

                alert('✅ Vehicle deleted successfully!');
                loadVehicles();
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Load vehicles on page load
        loadVehicles();
    </script>
</body>
</html>
