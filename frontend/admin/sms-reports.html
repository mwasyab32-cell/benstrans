<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Reports - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .stat-card.success .stat-value { color: #28a745; }
        .stat-card.danger .stat-value { color: #dc3545; }
        .stat-card.warning .stat-value { color: #ffc107; }
        
        .logs-table {
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .logs-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .logs-table th {
            background: #007bff;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .logs-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .logs-table tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
        }
        
        .refresh-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
    <button class="refresh-btn" onclick="loadStats()">🔄 Refresh</button>
    
    <div style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        <h1>SMS Delivery Reports</h1>
        
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <div class="stat-label">Total Sent</div>
                <div class="stat-value" id="totalSent">-</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">Delivered</div>
                <div class="stat-value" id="delivered">-</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Failed</div>
                <div class="stat-value" id="failed">-</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pending">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Cost</div>
                <div class="stat-value" id="totalCost">-</div>
            </div>
        </div>
        
        <div class="logs-table">
            <h2 style="padding: 20px; margin: 0; background: #f8f9fa;">Recent SMS Logs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date/Time</th>
                        <th>Phone Number</th>
                        <th>Message</th>
                        <th>Status</th>
                        <th>Delivery</th>
                        <th>Cost</th>
                        <th>Network</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'https://benstrans.onrender.com/api';

        async function loadStats() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/sms/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load SMS stats');

                const data = await response.json();
                
                // Update statistics
                const stats = data.statistics;
                document.getElementById('totalSent').textContent = stats.total_sent || 0;
                document.getElementById('delivered').textContent = stats.delivered || 0;
                document.getElementById('failed').textContent = stats.failed || 0;
                document.getElementById('pending').textContent = stats.pending || 0;
                document.getElementById('totalCost').textContent = stats.total_cost 
                    ? `KSh ${parseFloat(stats.total_cost).toFixed(2)}` 
                    : 'KSh 0.00';
                
                // Update logs table
                const tbody = document.getElementById('logsTableBody');
                
                if (data.recent_logs.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 40px;">
                                No SMS logs yet
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = data.recent_logs.map(log => `
                    <tr>
                        <td>${new Date(log.sent_at).toLocaleString()}</td>
                        <td>${log.phone_number}</td>
                        <td>${log.message_preview}...</td>
                        <td>
                            <span class="status-badge status-${log.status === 'sent' ? 'success' : log.status === 'failed' ? 'failed' : 'pending'}">
                                ${log.status || 'pending'}
                            </span>
                        </td>
                        <td>
                            ${log.delivery_status ? `
                                <span class="status-badge status-${log.delivery_status === 'Success' ? 'success' : 'failed'}">
                                    ${log.delivery_status}
                                </span>
                            ` : '<span class="status-badge status-pending">Pending</span>'}
                        </td>
                        <td>${log.cost || '-'}</td>
                        <td>${log.network || '-'}</td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load SMS statistics');
            }
        }

        // Load stats on page load
        loadStats();
        
        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
