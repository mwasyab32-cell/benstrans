<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .bookings-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .bookings-table {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-paid { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>All Bookings</h1>
            <button onclick="location.href='dashboard.html'" class="btn">Back to Dashboard</button>
        </div>

        <div class="bookings-container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalBookings">0</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="paidBookings">0</div>
                    <div class="stat-label">Paid Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingBookings">0</div>
                    <div class="stat-label">Pending Payment</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalRevenue">KSh 0</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Status:</label>
                    <select id="filterStatus" onchange="loadBookings()">
                        <option value="">All Status</option>
                        <option value="paid">Paid</option>
                        <option value="pending">Pending</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Search:</label>
                    <input type="text" id="searchQuery" placeholder="Name, email, or reference..." onkeyup="loadBookings()">
                </div>
                <div class="filter-group">
                    <label>Date From:</label>
                    <input type="date" id="dateFrom" onchange="loadBookings()">
                </div>
                <div class="filter-group">
                    <label>Date To:</label>
                    <input type="date" id="dateTo" onchange="loadBookings()">
                </div>
            </div>

            <!-- Bookings Table -->
            <div class="bookings-table">
                <table>
                    <thead>
                        <tr>
                            <th>Reference</th>
                            <th>Customer</th>
                            <th>Contact</th>
                            <th>Route</th>
                            <th>Travel Date</th>
                            <th>Seats</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Booked On</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <tr><td colspan="9" style="text-align: center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let allBookings = [];

        async function loadBookings() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/admin/bookings`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load bookings');

                allBookings = await response.json();
                filterAndDisplayBookings();
                updateStats();
            } catch (error) {
                document.getElementById('bookingsTableBody').innerHTML = 
                    `<tr><td colspan="9" style="color: red; text-align: center;">Error: ${error.message}</td></tr>`;
            }
        }

        function filterAndDisplayBookings() {
            const status = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchQuery').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            let filtered = allBookings.filter(booking => {
                // Status filter
                if (status && booking.payment_status !== status) return false;
                
                // Search filter
                if (search) {
                    const searchText = `${booking.customer_name} ${booking.customer_email} ${booking.reference_number}`.toLowerCase();
                    if (!searchText.includes(search)) return false;
                }
                
                // Date filters
                if (dateFrom && booking.travel_date < dateFrom) return false;
                if (dateTo && booking.travel_date > dateTo) return false;
                
                return true;
            });

            displayBookings(filtered);
        }

        function getSeatNumbers(seatNumbers) {
            if (!seatNumbers) return 'N/A';
            try {
                const seats = typeof seatNumbers === 'string' ? JSON.parse(seatNumbers) : seatNumbers;
                return Array.isArray(seats) ? seats.join(', ') : 'N/A';
            } catch (e) {
                return 'N/A';
            }
        }

        function displayBookings(bookings) {
            const tbody = document.getElementById('bookingsTableBody');
            
            if (bookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center;">No bookings found</td></tr>';
                return;
            }

            tbody.innerHTML = bookings.map(b => `
                <tr>
                    <td><strong>${b.reference_number}</strong></td>
                    <td>${b.customer_name}</td>
                    <td>
                        ${b.customer_email}<br>
                        <small>${b.customer_phone}</small>
                    </td>
                    <td>${b.route_from} → ${b.route_to}</td>
                    <td>${new Date(b.travel_date).toLocaleDateString()}<br><small>${b.departure_time}</small></td>
                    <td>${b.seats_booked} seat(s)<br><small>${getSeatNumbers(b.seat_numbers)}</small></td>
                    <td><strong>KSh ${b.total_amount}</strong></td>
                    <td><span class="status-badge status-${b.payment_status}">${b.payment_status.toUpperCase()}</span></td>
                    <td>${new Date(b.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const total = allBookings.length;
            const paid = allBookings.filter(b => b.payment_status === 'paid').length;
            const pending = allBookings.filter(b => b.payment_status === 'pending').length;
            const revenue = allBookings
                .filter(b => b.payment_status === 'paid')
                .reduce((sum, b) => sum + parseFloat(b.total_amount), 0);

            document.getElementById('totalBookings').textContent = total;
            document.getElementById('paidBookings').textContent = paid;
            document.getElementById('pendingBookings').textContent = pending;
            document.getElementById('totalRevenue').textContent = `KSh ${revenue.toLocaleString()}`;
        }

        // Load bookings on page load
        loadBookings();
    </script>
</body>
</html>
